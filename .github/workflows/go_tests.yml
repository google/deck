name: Go Tests
on: [push, pull_request]
jobs:
  win_tests:
    runs-on: windows-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Run vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...
  linux_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Run vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...
  mac_tests:
    runs-on: macos-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Run vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...
